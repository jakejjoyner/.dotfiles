general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /path/to/your/wallpaper.png   # PNG is recommended
    color = rgba(0, 0, 0, 1.0)
    blur_passes = 2 # 0 disables blurring
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%Y-%m-%d")"
    font_size = 72
    monitor =
    color = rgba(200, 200, 200, 1.0)
    font_family = Hack Nerd Font Light
    position = 0, 120
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    font_size = 24
    monitor =
    color = rgba(200, 200, 200, 1.0)
    font_family = Hack Nerd Font Light
    position = 0, 40
    halign = center
    valign = center
}
