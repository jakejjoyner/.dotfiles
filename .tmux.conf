set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'
set -sg escape-time 0
set -g xterm-keys on

# Forward extended keys (Shift+Enter, Ctrl+Enter, etc.) from Kitty through
# to apps like Claude Code. Added 2026-04-17.
set -g extended-keys always
set -sa terminal-features 'xterm*:extkeys'
set -g status-right "#(/home/jjoyner/gt-lab/bin/tmux-status-right)"
set -g status-interval 10
set -g default-command "${SHELL}"
set -g update-environment "SSH_AUTH_SOCK"

set -g -a terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g status-style 'bg=#333333 fg=#5eacd3'
set -g base-index 1

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind-key -r ^ last-window
bind-key -r k select-pane -U
bind-key -r j select-pane -D
bind-key -r h select-pane -L
bind-key -r l select-pane -R

bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/workspace/dev/todo.md"

# forget the find window.  That is for chumps
bind-key -r f neww /home/jjoyner/dev-env/.local/scripts/tmux-sessionizer
bind -r r source-file $HOME/.tmux.conf \; display-message "tmux.conf reloaded"

# Mouse + scroll-to-copy-mode (added 2026-04-26 — wheel scrolls pane buffer, not shell history)
set -g mouse on

# OSC 52 clipboard passthrough (added 2026-05-01 — was the missing piece for
# paste-ready not landing on system clipboard from inside tmux). Tmux must be
# explicitly told to forward OSC 52 sequences and which capability string to use.
set -g set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'
